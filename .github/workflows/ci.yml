name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # One job, because the Go tests need the built SPA: the server embeds
  # web/dist via //go:embed, and the SPA fallback test asserts a real
  # index.html comes back. A fresh clone only has the .gitkeep placeholder.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The pnpm version comes from web/package.json; there is no root manifest.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - run: pnpm install --frozen-lockfile
        working-directory: web
      - run: pnpm typecheck
        working-directory: web
      - run: pnpm build
        working-directory: web

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
