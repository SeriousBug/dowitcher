name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # One job, because the Go tests need the built SPA: the server embeds
  # web/dist via //go:embed, and the SPA fallback test asserts a real
  # index.html comes back. A fresh clone only has the .gitkeep placeholder.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The pnpm version comes from web/package.json; there is no root manifest.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - run: pnpm install --frozen-lockfile
        working-directory: web
      - run: pnpm typecheck
        working-directory: web
      - run: pnpm build
        working-directory: web

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      # Chromium alone: playwright.config.ts declares no other project, and what
      # the suite tests is service worker behaviour rather than rendering.
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: web

      # Boots the real server from e2e/serve.sh — `go build -tags dev` for the
      # auth bypass, serving the SPA embedded from web/dist. `pnpm e2e` rebuilds
      # dist itself, so this cannot drive a stale bundle if the steps above move.
      - run: pnpm e2e
        working-directory: web

      # Traces are written only for failures (see `trace` in playwright.config).
      # Without them a red offline test is close to undebuggable from a log.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: web/test-results/
          retention-days: 7
